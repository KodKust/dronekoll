# Bygg + deploya dronekoll.com (Astro → GitHub Pages via Actions).
#
# Triggers:
#  - push till main (kodändringar)
#  - daglig cron 07:20 UTC (färskhets-rebuild: nytt {year}/byggdatum + färsk
#    countries.json — EFTER nattens fetchers 04–05 + web-optimize 06:10)
#  - repository_dispatch "site-data-updated" (skickas av dronarkartans
#    publish-gist.yml → sajten byggs om inom minuter när countries.json ändras)
#  - manuell dispatch
#
# OBS: Aktiveras skarpt först i fas 9 när Pages växlas till build_type=workflow
# (gh api PUT repos/KodKust/dronekoll/pages -f build_type=workflow).
name: build-deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '20 7 * * *' # efter natt-fetchers (04–05) + web-optimize (06:10) i dronarkartan
  workflow_dispatch:
  repository_dispatch:
    types: [site-data-updated]

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # REPO-BUILD-03: SHA-pinnade Actions (mot tag-mutation/supply-chain).
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0 # slug-frysvakten diffar mot origin/main

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Hämta livedata (Gist + baselines; snapshot-fallback vid fel)
        run: node scripts/fetch-data.mjs

      - name: "Bygg kartmanifest (live web-manifest → data/live/map-manifest.json)"
        run: node scripts/build-manifest.mjs

      - name: "Bygg (strikt: EN-overlays krävs, sidantal assertas)"
        run: npx astro build && node scripts/verify-build.mjs
        env:
          STRICT_EN: '1'
          ASSERT_PAGES: '1'
          STRICT_L10N: '1'

      - name: "Matris-staleness (warn-only — stale celler flaggas i /api/cell/)"
        run: node scripts/check-matrix-staleness.mjs

      - name: "Intern länkkontroll (fail-closed — brutna länkar fäller bygget)"
        run: node scripts/check-links.mjs

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: "IndexNow — pinga Bing/Yandex om live-sidorna (ej daglig cron)"
        if: github.event_name != 'schedule'
        continue-on-error: true
        run: |
          KEY=b67bd64c7a26a0fab9953aad21b270d3
          sleep 15 # låt Pages-CDN propagera nyckelfilen + sidorna
          URLS=$(curl -s https://dronekoll.com/sitemap.xml \
            | grep -oE '<loc>[^<]+</loc>' | sed -e 's/<loc>//' -e 's#</loc>##' \
            | jq -R . | jq -s .)
          N=$(echo "$URLS" | jq 'length')
          echo "Submitterar $N URL:er till IndexNow"
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"dronekoll.com\",\"key\":\"$KEY\",\"keyLocation\":\"https://dronekoll.com/$KEY.txt\",\"urlList\":$URLS}" \
            -w "IndexNow-svar: HTTP %{http_code}\n"
